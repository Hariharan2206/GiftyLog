<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2CA6A4" />
  <title>GiftyLog</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .summary-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 6px; }
    .card-icon  { font-size: 1.6rem; margin-bottom: 4px; }
    .card-label { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .card-value { font-size: 2rem; font-weight: 800; }
    .card-indigo  { border-top: 3px solid var(--indigo);  }
    .card-emerald { border-top: 3px solid var(--emerald); }
    .card-amber   { border-top: 3px solid var(--amber);   }

    .activity-list { display: flex; flex-direction: column; gap: 10px; }
    .activity-item { background: var(--card); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; }
    .activity-emoji { font-size: 1.5rem; flex-shrink: 0; }
    .activity-body  { flex: 1; }
    .activity-name  { font-weight: 600; font-size: .9rem; }
    .activity-meta  { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
    .activity-time  { font-size: .75rem; color: var(--text-muted); white-space: nowrap; }

    .quick-links { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .quick-link { display: flex; align-items: center; gap: 8px; padding: 12px 18px; background: var(--card); border-radius: 10px; box-shadow: var(--shadow); font-weight: 600; font-size: .9rem; border: 2px solid transparent; transition: border-color .15s, box-shadow .15s; }
    .quick-link:hover { border-color: var(--indigo-light); box-shadow: var(--shadow-lg); }
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Overview</div>
          <div class="page-subtitle">Your gift log at a glance</div>
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-refresh"><i class="ti ti-refresh"></i> Refresh</button>
      </div>

      <div class="cards-grid">
        <div class="summary-card card-indigo">
          <div class="card-icon">🎉</div>
          <div class="card-label">Total Events</div>
          <div class="card-value" id="stat-events">—</div>
        </div>
        <div class="summary-card card-emerald">
          <div class="card-icon">🎁</div>
          <div class="card-label">Total Gifts</div>
          <div class="card-value" id="stat-gifts">—</div>
        </div>
        <div class="summary-card card-amber">
          <div class="card-icon">💰</div>
          <div class="card-label">Total Cash</div>
          <div class="card-value" id="stat-cash">—</div>
        </div>
      </div>

      <div class="quick-links">
        <a href="events.html" class="quick-link">🎉 Manage Events →</a>
        <a href="gifts.html"  class="quick-link">🎁 All Gifts →</a>
      </div>

      <div class="section-title">Recent Activity</div>
      <div class="activity-list" id="activity-list">
        <div class="empty-state"><div class="empty-icon">✨</div><p>No activity yet.</p></div>
      </div>
    </div>
  </main>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
(async () => {
  await initApp('overview');

  function render() {
    const totalCash = state.gifts.filter(g => g.giftType === 'Cash').reduce((s, g) => s + (parseFloat(g.quantity) || 0), 0);
    document.getElementById('stat-events').textContent = state.events.length;
    document.getElementById('stat-gifts').textContent  = state.gifts.length;
    document.getElementById('stat-cash').textContent   = '₹' + totalCash.toLocaleString('en-IN', { minimumFractionDigits: 2 });

    const recent = [...state.gifts].sort((a, b) => new Date(b.updatedDateTime) - new Date(a.updatedDateTime)).slice(0, 5);
    const list   = document.getElementById('activity-list');
    if (!recent.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div><p>No activity yet.</p></div>`;
      return;
    }
    list.innerHTML = recent.map(g => {
      const evt = state.events.find(e => e.id === g.eventId);
      return `<div class="activity-item">
        <div class="activity-emoji">${GIFT_EMOJI[g.giftType] || '🎁'}</div>
        <div class="activity-body">
          <div class="activity-name">${esc(g.gifterName)}</div>
          <div class="activity-meta">${esc(g.giftType)}${g.quantity ? ' · ' + g.quantity : ''} · ${esc(evt ? evt.eventName : '—')}</div>
        </div>
        <div class="activity-time">${fmt(g.updatedDateTime)}</div>
      </div>`;
    }).join('');
  }

  await loadAll();
  render();

  document.getElementById('btn-refresh').addEventListener('click', async () => {
    await loadAll(); render();
  });
})();
</script>
</body>
</html>
