<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Box body -->
  <rect x="8" y="30" width="48" height="28" rx="3" fill="#2CA6A4"/>
  <!-- Box lid -->
  <rect x="6" y="22" width="52" height="12" rx="3" fill="#20847F"/>
  <!-- Lid shine -->
  <rect x="8" y="23" width="48" height="4" rx="2" fill="#3DBFBD" opacity="0.4"/>
  <!-- Vertical ribbon -->
  <rect x="28" y="22" width="8" height="38" fill="#FFD166"/>
  <!-- Horizontal ribbon on lid -->
  <rect x="6" y="26" width="52" height="4" fill="#FFC233"/>
  <!-- Bow left loop -->
  <ellipse cx="22" cy="20" rx="10" ry="6" fill="#FFD166" transform="rotate(-20 22 20)"/>
  <!-- Bow right loop -->
  <ellipse cx="42" cy="20" rx="10" ry="6" fill="#FFD166" transform="rotate(20 42 20)"/>
  <!-- Bow center knot -->
  <circle cx="32" cy="22" r="5" fill="#FFC233"/>
  <!-- Box shadow line -->
  <rect x="8" y="54" width="48" height="3" rx="1.5" fill="#1A6B69" opacity="0.5"/>
  <!-- Shine on box body -->
  <rect x="10" y="32" width="18" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
</svg>
