<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2CA6A4" />
  <title>Events — GiftyLog</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .event-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      transition: box-shadow .2s, transform .15s, border-color .15s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .event-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--emerald); }

    .event-card-accent { height: 4px; background: var(--emerald); }
    .event-card-body   { padding: 18px 20px 14px; flex: 1; cursor: pointer; }
    .event-card-name   { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }
    .event-card-meta   { display: flex; flex-direction: column; gap: 4px; font-size: .82rem; color: var(--text-muted); }
    .event-card-meta span { display: flex; align-items: center; gap: 6px; }

    .event-card-footer {
      padding: 10px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }
    .gift-count-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #D1FAE5;
      color: #065F46;
      font-size: .78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .event-actions { display: flex; gap: 6px; }

    @media (max-width: 480px) {
      .events-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Events</div>
          <div class="page-subtitle">All your logged events</div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost btn-sm" id="btn-refresh">🔄 Refresh</button>
          <button class="btn btn-emerald"      id="btn-add-event">＋ Add Event</button>
        </div>
      </div>

      <div class="events-grid" id="events-grid">
        <div class="empty-state"><div class="empty-icon">🎉</div><p>No events yet. Add one!</p></div>
      </div>
    </div>
  </main>
</div>

<!-- Add / Edit Event Modal -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-event-title">Add Event</div>
      <button class="modal-close" onclick="closeModal('modal-event')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="evt-id" />
      <div class="form-group">
        <label class="form-label">Event Name *</label>
        <input class="form-control" id="evt-name"  type="text"  placeholder="e.g. Wedding Reception" />
      </div>
      <div class="form-group">
        <label class="form-label">Venue</label>
        <input class="form-control" id="evt-venue" type="text"  placeholder="e.g. Grand Ballroom" />
      </div>
      <div class="form-group">
        <label class="form-label">Place</label>
        <input class="form-control" id="evt-place" type="text"  placeholder="e.g. Chennai, India" />
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-control" id="evt-date"  type="date" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost"   onclick="closeModal('modal-event')">Cancel</button>
        <button class="btn btn-emerald" id="btn-save-event">Save Event</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
(async () => {
  await initApp('events');

  /* ── Render ── */
  function render() {
    const grid = document.getElementById('events-grid');
    if (!state.events.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><p>No events yet. Add one!</p></div>`;
      return;
    }
    grid.innerHTML = state.events.map(evt => {
      const count = state.gifts.filter(g => g.eventId === evt.id).length;
      return `
        <div class="event-card" data-id="${esc(evt.id)}">
          <div class="event-card-accent"></div>
          <div class="event-card-body" data-nav="${esc(evt.id)}">
            <div class="event-card-name">${esc(evt.eventName)}</div>
            <div class="event-card-meta">
              ${evt.venue ? `<span>🏛 ${esc(evt.venue)}</span>` : ''}
              ${evt.place ? `<span>📍 ${esc(evt.place)}</span>` : ''}
              ${evt.date  ? `<span>📅 ${fmtDate(evt.date)}</span>` : ''}
            </div>
          </div>
          <div class="event-card-footer">
            <span class="gift-count-badge">🎁 ${count} gift${count !== 1 ? 's' : ''}</span>
            <div class="event-actions">
              <button class="btn btn-primary btn-sm" data-edit="${esc(evt.id)}">✏️ Edit</button>
              <button class="btn btn-rose  btn-sm" data-del="${esc(evt.id)}">🗑️</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  render();
  if (!state.events.length && !state.gifts.length) { await loadAll(); render(); }

  /* ── Navigation ── */
  document.getElementById('events-grid').addEventListener('click', e => {
    const nav  = e.target.closest('[data-nav]');
    const edit = e.target.closest('[data-edit]');
    const del  = e.target.closest('[data-del]');

    if (del) {
      const id  = del.dataset.del;
      const evt = state.events.find(x => x.id === id);
      confirmDelete(
        `Delete "${evt ? evt.eventName : ''}" and all its gifts? This cannot be undone.`,
        async () => { await deleteEvent(id); render(); showToast('Event deleted', 'success'); }
      );
      return;
    }
    if (edit) { openEventModal(state.events.find(x => x.id === edit.dataset.edit)); return; }
    if (nav)  { window.location.href = `event-detail.html?id=${nav.dataset.nav}`; }
  });

  /* ── Event modal ── */
  function openEventModal(evt = null) {
    document.getElementById('evt-id').value    = evt?.id        || '';
    document.getElementById('evt-name').value  = evt?.eventName || '';
    document.getElementById('evt-venue').value = evt?.venue     || '';
    document.getElementById('evt-place').value = evt?.place     || '';
    document.getElementById('evt-date').value  = toInputDate(evt?.date);
    document.getElementById('modal-event-title').textContent = evt ? 'Edit Event' : 'Add Event';
    openModal('modal-event');
  }

  document.getElementById('btn-add-event').addEventListener('click', () => openEventModal());

  document.getElementById('btn-save-event').addEventListener('click', async () => {
    const name = document.getElementById('evt-name').value.trim();
    if (!name) { showToast('Event name is required', 'error'); return; }
    const evt = {
      id:        document.getElementById('evt-id').value  || uuid(),
      eventName: name,
      venue:     document.getElementById('evt-venue').value.trim(),
      place:     document.getElementById('evt-place').value.trim(),
      date:      document.getElementById('evt-date').value,
    };
    const btn = document.getElementById('btn-save-event');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
    try {
      await saveEvent(evt);
      closeModal('modal-event');
      render();
      showToast('Event saved ✓', 'success');
    } catch (err) { showToast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Event'; }
  });

  document.getElementById('modal-event').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-event')) closeModal('modal-event');
  });

  document.getElementById('btn-refresh').addEventListener('click', async () => { await loadAll(); render(); });
})();
</script>
</body>
</html>
