<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2CA6A4" />
  <title>Event Detail — GiftyLog</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .event-header {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .event-header-accent { height: 5px; background: var(--emerald); }
    .event-header-body   { padding: 18px 20px; }
    .event-header-top    { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .event-title         { font-size: 1.35rem; font-weight: 800; margin-bottom: 10px; }
    .event-meta          { display: flex; flex-wrap: wrap; gap: 14px; font-size: .85rem; color: var(--text-muted); }
    .event-meta span     { display: flex; align-items: center; gap: 5px; }
    .event-header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .gifts-list { display: flex; flex-direction: column; gap: 10px; }

    .gift-row { background: var(--card); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; transition: box-shadow .15s; }
    .gift-row:hover { box-shadow: var(--shadow-lg); }
    .gift-row-info    { flex: 1; min-width: 0; }
    .gift-row-name    { font-weight: 700; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gift-row-tags    { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
    .gift-row-meta    { font-size: .78rem; color: var(--text-muted); }
    .gift-row-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .detail-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }

    @media (max-width: 480px) {
      .gift-row { flex-wrap: wrap; }
      .gift-row-actions { width: 100%; justify-content: flex-end; }
      .event-header-top { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div class="page">
      <a href="events.html" class="back-btn">← Back to Events</a>

      <!-- Event header -->
      <div class="event-header" id="event-header">
        <div class="event-header-accent"></div>
        <div class="event-header-body">
          <div class="event-header-top">
            <div>
              <div class="event-title" id="evt-title">—</div>
              <div class="event-meta"  id="evt-meta"></div>
            </div>
            <div class="event-header-actions">
              <button class="btn btn-primary btn-sm" id="btn-edit-event"><i class="ti ti-pencil"></i> Edit</button>
              <button class="btn btn-rose  btn-sm" id="btn-del-event"><i class="ti ti-trash"></i> Delete</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Gifts toolbar -->
      <div class="detail-toolbar">
        <div class="section-title" style="margin:0">Gifts</div>
        <button class="btn btn-emerald btn-sm" id="btn-add-gift"><i class="ti ti-plus"></i> Add Gift</button>
      </div>

      <div class="search-wrap">
        <span class="search-icon"><i class="ti ti-search"></i></span>
        <input class="search-input" id="search" placeholder="Search by gifter name…" type="search" />
      </div>
      <div class="filter-bar" id="filter-bar"></div>
      <div class="gifts-list" id="gifts-grid"></div>

    </div>
  </main>
</div>

<!-- Edit Event Modal -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Event</div>
      <button class="modal-close" onclick="closeModal('modal-event')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="evt-id" />
      <div class="form-group">
        <label class="form-label">Event Name *</label>
        <input class="form-control" id="evt-name"  type="text" />
      </div>
      <div class="form-group">
        <label class="form-label">Venue</label>
        <input class="form-control" id="evt-venue" type="text" />
      </div>
      <div class="form-group">
        <label class="form-label">Place</label>
        <input class="form-control" id="evt-place" type="text" />
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-control" id="evt-date"  type="date" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost"   onclick="closeModal('modal-event')">Cancel</button>
        <button class="btn btn-emerald" id="btn-save-event">Save Event</button>
      </div>
    </div>
  </div>
</div>

<!-- Add / Edit Gift Modal -->
<div class="modal-overlay" id="modal-gift">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-gift-title">Add Gift</div>
      <button class="modal-close" onclick="closeModal('modal-gift')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="gift-id" />
      <div class="form-group" style="position:relative">
        <label class="form-label">Gifter Name *</label>
        <input class="form-control" id="gift-gifter" type="text" placeholder="Full name" autocomplete="off" />
        <div id="gift-gifter-dropdown" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:600;max-height:180px;overflow-y:auto;margin-top:2px;"></div>
      </div>
      <div class="form-group" style="position:relative">
        <label class="form-label">Address</label>
        <textarea class="form-control" id="gift-address" placeholder="Street, City, State…" autocomplete="off" rows="2"></textarea>
        <div id="gift-address-dropdown" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:600;max-height:180px;overflow-y:auto;margin-top:2px;"></div>
      </div>
      <div class="form-group" style="position:relative">
        <label class="form-label">Gift Type *</label>
        <input class="form-control" id="gift-type" type="text" placeholder="e.g. Cash, Gold, Kind…" autocomplete="off" />
        <div id="gift-type-dropdown" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:600;max-height:180px;overflow-y:auto;margin-top:2px;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Quantity *</label>
        <input class="form-control" id="gift-qty" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <textarea class="form-control" id="gift-note" placeholder="Optional note…" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Photo (Optional)</label>
        <div class="photo-preview" id="gift-photo-preview">
          <div class="photo-placeholder"><span>📷</span>Tap to upload / capture</div>
        </div>
        <input type="file" id="gift-photo-input" accept="image/*" style="display:none" />
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="btn-photo-upload"><i class="ti ti-folder-open"></i> Upload</button>
          <button class="btn btn-ghost btn-sm" id="btn-photo-camera"><i class="ti ti-camera"></i> Camera</button>
          <button class="btn btn-rose  btn-sm" id="btn-photo-clear"  style="display:none"><i class="ti ti-x"></i> Remove</button>
        </div>
        <input type="hidden" id="gift-photo-b64" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost"   onclick="closeModal('modal-gift')">Cancel</button>
        <button class="btn btn-emerald" id="btn-save-gift">Save Gift</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
(async () => {
  await initApp('events');

  const params  = new URLSearchParams(location.search);
  const eventId = params.get('id');
  if (!eventId) { location.href = 'events.html'; return; }

  /* ensure data */
  await loadAll();

  let evt = state.events.find(e => e.id === eventId);
  if (!evt) { showToast('Event not found', 'error'); setTimeout(() => location.href = 'events.html', 1500); return; }

  let activeFilter = 'All';

  /* ── Render header ── */
  function renderHeader() {
    evt = state.events.find(e => e.id === eventId) || evt;
    document.title = `${evt.eventName} — GiftyLog`;
    document.getElementById('evt-title').textContent = evt.eventName;
    document.getElementById('evt-meta').innerHTML = [
      evt.venue ? `<span>🏛 ${esc(evt.venue)}</span>` : '',
      evt.place ? `<span>📍 ${esc(evt.place)}</span>` : '',
      evt.date  ? `<span>📅 ${fmtDate(evt.date)}</span>` : '',
    ].join('');
  }

  /* ── Render gifts ── */
  function renderGifts() {
    const q    = document.getElementById('search').value.toLowerCase();
    const types = ['All', ...new Set(state.gifts.filter(g => g.eventId === eventId).map(g => g.giftType).filter(Boolean))];

    document.getElementById('filter-bar').innerHTML = types.map(t =>
      `<button class="chip${activeFilter === t ? ' active' : ''}" data-chip="${esc(t)}">${esc(t)}</button>`
    ).join('');

    let gifts = state.gifts.filter(g => g.eventId === eventId);
    if (activeFilter !== 'All') gifts = gifts.filter(g => g.giftType === activeFilter);
    if (q) gifts = gifts.filter(g => (g.gifterName || '').toLowerCase().includes(q));

    const grid = document.getElementById('gifts-grid');
    if (!gifts.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎁</div><p>No gifts match your filter.</p></div>`;
      return;
    }
    grid.innerHTML = gifts.map(g => {
      const emoji = GIFT_EMOJI[g.giftType] || '🎁';
      const thumb = g.photo
        ? `<div class="gift-thumb"><img src="${g.photo}" alt="gift" loading="lazy" /></div>`
        : `<div class="gift-thumb" style="${giftTypeThumbStyle(g.giftType)}">${emoji}</div>`;
      return `
        <div class="gift-row" style="${giftTypeCardStyle(g.giftType)}">
          ${thumb}
          <div class="gift-row-info">
            <div class="gift-row-name">${esc(g.gifterName)}</div>
            <div class="gift-row-tags">
              <span class="badge" style="${giftTypeBadgeStyle(g.giftType)}">${esc(g.giftType || 'Other')}</span>
            </div>
            <div class="gift-row-meta">
              ${g.quantity ? `Qty: <b>${g.quantity}</b> · ` : ''}${fmt(g.updatedDateTime)}
              ${g.address  ? ` · 📍 ${esc(g.address)}` : ''}
              ${g.note     ? ` · 📝 ${esc(g.note)}` : ''}
            </div>
          </div>
          <div class="gift-row-actions">
            <button class="btn btn-primary btn-sm" data-edit-gift="${esc(g.id)}"><i class="ti ti-pencil"></i></button>
            <button class="btn btn-rose    btn-sm" data-del-gift="${esc(g.id)}"><i class="ti ti-trash"></i></button>
          </div>
        </div>`;
    }).join('');
  }

  renderHeader();
  renderGifts();

  /* ── Filter & search ── */
  document.getElementById('filter-bar').addEventListener('click', e => {
    const chip = e.target.closest('[data-chip]');
    if (chip) { activeFilter = chip.dataset.chip; renderGifts(); }
  });
  document.getElementById('search').addEventListener('input', renderGifts);

  /* ── Edit event ── */
  function populateEventModal() {
    document.getElementById('evt-id').value    = evt.id;
    document.getElementById('evt-name').value  = evt.eventName;
    document.getElementById('evt-venue').value = evt.venue || '';
    document.getElementById('evt-place').value = evt.place || '';
    document.getElementById('evt-date').value  = toInputDate(evt.date);
  }

  document.getElementById('btn-edit-event').addEventListener('click', () => { populateEventModal(); openModal('modal-event'); });

  document.getElementById('btn-save-event').addEventListener('click', async () => {
    const name = document.getElementById('evt-name').value.trim();
    if (!name) { showToast('Event name is required', 'error'); return; }
    const updated = {
      id:        document.getElementById('evt-id').value,
      eventName: name,
      venue:     document.getElementById('evt-venue').value.trim(),
      place:     document.getElementById('evt-place').value.trim(),
      date:      document.getElementById('evt-date').value,
    };
    const btn = document.getElementById('btn-save-event');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
    try {
      await saveEvent(updated);
      closeModal('modal-event');
      renderHeader();
      showToast('Event updated ✓', 'success');
    } catch (err) { showToast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Event'; }
  });

  /* ── Delete event ── */
  document.getElementById('btn-del-event').addEventListener('click', () => {
    confirmDelete(
      `Delete "${evt.eventName}" and all its gifts? This cannot be undone.`,
      async () => { await deleteEvent(eventId); location.href = 'events.html'; }
    );
  });

  /* ── Gift modal ── */
  let photoCtrl;
  let _giftTypeOptions = [];

  /* ── Gift-type custom combobox ── */
  const _typeInput = document.getElementById('gift-type');
  const _typeDrop  = document.getElementById('gift-type-dropdown');

  function _renderTypeDropdown(q) {
    const matches = _giftTypeOptions.filter(t => t.toLowerCase().includes(q.toLowerCase()));
    if (!matches.length) { _typeDrop.style.display = 'none'; return; }
    _typeDrop.innerHTML = matches.map(t =>
      `<div class="type-opt" data-val="${esc(t)}" style="padding:9px 14px;cursor:pointer;font-size:.9rem;">${esc(t)}</div>`
    ).join('');
    _typeDrop.style.display = 'block';
  }

  _typeInput.addEventListener('input', () => _renderTypeDropdown(_typeInput.value));
  _typeInput.addEventListener('focus', () => _renderTypeDropdown(_typeInput.value));

  _typeDrop.addEventListener('mousedown', e => {
    const opt = e.target.closest('.type-opt');
    if (!opt) return;
    e.preventDefault();
    _typeInput.value = opt.dataset.val;
    _typeDrop.style.display = 'none';
  });

  _typeDrop.addEventListener('mouseover', e => {
    const opt = e.target.closest('.type-opt');
    if (opt) opt.style.background = 'var(--surface)';
  });
  _typeDrop.addEventListener('mouseout', e => {
    const opt = e.target.closest('.type-opt');
    if (opt) opt.style.background = '';
  });

  document.addEventListener('click', e => {
    if (!_typeInput.contains(e.target) && !_typeDrop.contains(e.target))
      _typeDrop.style.display = 'none';
  });

  /* ── Gifter name + address autocomplete ── */
  const _gifterInput = document.getElementById('gift-gifter');
  const _gifterDrop  = document.getElementById('gift-gifter-dropdown');
  const _addrInput   = document.getElementById('gift-address');
  const _addrDrop    = document.getElementById('gift-address-dropdown');

  function _makeDropdown(drop, items, onPick) {
    if (!items.length) { drop.style.display = 'none'; return; }
    drop.innerHTML = items.map(v =>
      `<div class="type-opt" data-val="${esc(v)}" style="padding:9px 14px;cursor:pointer;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v)}</div>`
    ).join('');
    drop.style.display = 'block';
    drop.addEventListener('mousedown', function handler(e) {
      const opt = e.target.closest('.type-opt');
      if (!opt) return;
      e.preventDefault();
      onPick(opt.dataset.val);
      drop.style.display = 'none';
      drop.removeEventListener('mousedown', handler);
    }, { once: false });
    drop.addEventListener('mouseover', e => { const o = e.target.closest('.type-opt'); if (o) o.style.background = 'var(--surface)'; });
    drop.addEventListener('mouseout',  e => { const o = e.target.closest('.type-opt'); if (o) o.style.background = ''; });
  }

  function _uniqueGifters() {
    /* unique records keyed by name+address so same name from different cities both appear */
    const map = new Map();
    for (const g of state.gifts) {
      const key = `${(g.gifterName||'').toLowerCase()}|${(g.address||'').toLowerCase()}`;
      if (g.gifterName && !map.has(key)) map.set(key, { name: g.gifterName, address: g.address || '' });
    }
    return [...map.values()];
  }

  _gifterInput.addEventListener('input', () => {
    const q = _gifterInput.value.trim().toLowerCase();
    const matches = _uniqueGifters().filter(r => r.name.toLowerCase().includes(q));
    if (!matches.length) { _gifterDrop.style.display = 'none'; return; }
    _gifterDrop.innerHTML = matches.map(r => `
      <div class="type-opt" data-name="${esc(r.name)}" data-addr="${esc(r.address)}"
           style="padding:8px 14px;cursor:pointer;line-height:1.3">
        <div style="font-size:.9rem;font-weight:600">${esc(r.name)}</div>
        ${r.address ? `<div style="font-size:.75rem;color:var(--text-muted)">📍 ${esc(r.address)}</div>` : ''}
      </div>`).join('');
    _gifterDrop.style.display = 'block';
    _gifterDrop.querySelectorAll('.type-opt').forEach(opt => {
      opt.addEventListener('mouseover', () => opt.style.background = 'var(--surface)');
      opt.addEventListener('mouseout',  () => opt.style.background = '');
      opt.addEventListener('mousedown', e => {
        e.preventDefault();
        _gifterInput.value = opt.dataset.name;
        _addrInput.value   = opt.dataset.addr;
        _gifterDrop.style.display = 'none';
      });
    });
  });
  _gifterInput.addEventListener('focus', () => _gifterInput.dispatchEvent(new Event('input')));

  _addrInput.addEventListener('input', () => {
    const q = _addrInput.value.trim().toLowerCase();
    const allAddrs = [...new Set(state.gifts.map(g => g.address).filter(Boolean))];
    const matches  = allAddrs.filter(a => a.toLowerCase().includes(q));
    _makeDropdown(_addrDrop, matches, val => { _addrInput.value = val; });
  });
  _addrInput.addEventListener('focus', () => _addrInput.dispatchEvent(new Event('input')));

  document.addEventListener('click', e => {
    if (!_gifterInput.contains(e.target) && !_gifterDrop.contains(e.target)) _gifterDrop.style.display = 'none';
    if (!_addrInput.contains(e.target)   && !_addrDrop.contains(e.target))   _addrDrop.style.display   = 'none';
  });

  function openGiftModal(gift = null) {
    document.getElementById('gift-id').value        = gift?.id          || '';
    document.getElementById('gift-gifter').value    = gift?.gifterName  || '';
    document.getElementById('gift-address').value   = gift?.address     || '';
    document.getElementById('gift-type').value      = gift?.giftType    || '';
    document.getElementById('gift-qty').value       = gift?.quantity    || '';
    document.getElementById('gift-note').value      = gift?.note        || '';
    document.getElementById('gift-photo-b64').value = gift?.photo       || '';
    document.getElementById('modal-gift-title').textContent = gift ? 'Edit Gift' : 'Add Gift';
    photoCtrl?.setPreview(gift?.photo || '');
    document.getElementById('gift-photo-input').value = '';
    _giftTypeOptions = [...new Set(state.gifts.map(g => g.giftType).filter(Boolean))];
    openModal('modal-gift');
  }

  photoCtrl = setupPhotoInput({
    inputId:   'gift-photo-input',
    previewId: 'gift-photo-preview',
    b64Id:     'gift-photo-b64',
    clearBtnId:'btn-photo-clear',
  });

  document.getElementById('btn-add-gift').addEventListener('click', () => openGiftModal());

  document.getElementById('gifts-grid').addEventListener('click', e => {
    const edit = e.target.closest('[data-edit-gift]');
    const del  = e.target.closest('[data-del-gift]');
    if (edit) { openGiftModal(state.gifts.find(g => g.id === edit.dataset.editGift)); return; }
    if (del) {
      const g = state.gifts.find(g => g.id === del.dataset.delGift);
      confirmDelete(
        `Delete gift from "${g?.gifterName || ''}"? This cannot be undone.`,
        async () => { await deleteGift(del.dataset.delGift); renderGifts(); showToast('Gift deleted', 'success'); }
      );
    }
  });

  document.getElementById('btn-save-gift').addEventListener('click', async () => {
    const gifter = document.getElementById('gift-gifter').value.trim();
    const type   = document.getElementById('gift-type').value.trim();
    const qty    = document.getElementById('gift-qty').value;
    if (!gifter) { showToast('Gifter name is required', 'error'); return; }
    if (!type)   { showToast('Gift type is required', 'error'); return; }
    if (!qty || isNaN(parseFloat(qty))) { showToast('Quantity is required', 'error'); return; }

    const gift = {
      id:              document.getElementById('gift-id').value || uuid(),
      eventId,
      gifterName:      gifter,
      address:         document.getElementById('gift-address').value.trim(),
      giftType:        type,
      quantity:        parseFloat(qty),
      note:            document.getElementById('gift-note').value.trim(),
      photo:           document.getElementById('gift-photo-b64').value,
      updatedDateTime: nowISO(),
    };
    const btn = document.getElementById('btn-save-gift');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
    try {
      await saveGift(gift);
      closeModal('modal-gift');
      renderGifts();
      showToast('Gift saved ✓', 'success');
    } catch (err) { showToast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Gift'; }
  });

  /* close modals on backdrop click */
  ['modal-event','modal-gift'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => { if (e.target.id === id) closeModal(id); });
  });
})();
</script>
</body>
</html>
